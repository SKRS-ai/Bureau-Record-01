<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-IPVB | Asset Submission & Forensic Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0a192f; --gold: #c5a059; --slate: #112240; --white: #f8f9fa; }
        body { background: var(--blue); color: var(--white); font-family: 'Montserrat', sans-serif; margin: 0; }
        
        .header-slim { border-bottom: 1px solid var(--gold); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; background: var(--slate); }
        .header-slim h2 { font-family: 'Libre Baskerville', serif; color: var(--gold); margin: 0; font-size: 1.2rem; letter-spacing: 2px; }

        .container { max-width: 900px; margin: 4rem auto; padding: 0 20px; }
        .form-section { background: var(--slate); padding: 30px; border: 1px solid #233554; margin-bottom: 2rem; border-radius: 4px; }
        h1 { font-family: 'Libre Baskerville', serif; margin-bottom: 1rem; }
        p.subtitle { opacity: 0.7; margin-bottom: 3rem; border-left: 3px solid var(--gold); padding-left: 15px; }

        label { display: block; font-weight: 700; margin-bottom: 10px; color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #0a192f; border: 1px solid #233554; color: white; margin-bottom: 20px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }

        .nmmmb-audit-box { border: 1px solid var(--gold); padding: 20px; background: rgba(197, 160, 89, 0.05); }
        .audit-step { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 15px; }
        .step-letter { font-family: 'Libre Baskerville', serif; font-size: 1.5rem; color: var(--gold); font-weight: bold; width: 30px; }

        .btn-submit { background: var(--gold); color: var(--blue); border: none; padding: 15px 40px; font-weight: 700; cursor: pointer; width: 100%; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .btn-submit:hover { background: #d4af37; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

        footer { text-align: center; padding: 2rem; font-size: 0.7rem; opacity: 0.5; }
    </style>
</head>
<body>

<div class="header-slim">
    <h2>AI-IPVB // PORTAL</h2>
    <div style="font-size: 0.7rem; letter-spacing: 2px;">SECURE LOG: SOLOMON KIN, LLC</div>
</div>

<div class="container">
    <h1>Submit Asset for Certification</h1>
    <p class="subtitle">Initiate the NMMMB Forensic Audit. Please provide the "Chain of Provenance" required for federal intellectual property alignment.</p>

    <form>
        <div class="form-section">
            <label>Registration Entity</label>
            <select>
                <option>Cast Ai Stars (Commercial Talent)</option>
                <option>NMMMB Gallery (Fine Art)</option>
                <option>Solomon Kin Records (Sonic/Media)</option>
                <option>Global Citizen Joe (Corporate Assets)</option>
            </select>

            <label>Asset Name / Project Code</label>
            <input type="text" placeholder="e.g. LYRA-2026-V1">

            <label>Neural Baseline (N)</label>
            <input type="text" placeholder="Base AI Model & Version (e.g. Sora v1.2, Lyria 3)">
        </div>

        <div class="form-section nmmmb-audit-box">
            <label>Pillar 2: The NMMMB Audit Data</label>
            
            <div class="audit-step">
                <div class="step-letter">M</div>
                <div style="flex:1">
                    <label>Manifest Audit: Prompt Iteration Count</label>
                    <input type="number" placeholder="Total unique human-led iterations (Min. 100 for Tier 2)">
                </div>
            </div>

            <div class="audit-step">
                <div class="step-letter">M</div>
                <div style="flex:1">
                    <label>Manual Modification: Transformation Log</label>
                    <textarea rows="4" placeholder="Describe manual pixel edits, layer masking, or structural refactoring performed by the human author..."></textarea>
                </div>
            </div>

            <div class="audit-step">
                <div class="step-letter">M</div>
                <div style="flex:1">
                    <label>Mapping Provenance: Source URL/Hash</label>
                    <input type="text" placeholder="Link to raw iterative history or cryptographic hash">
                </div>
            </div>
        </div>

        <div class="form-section">
            <label>Requested Certification Level</label>
            <select style="border: 1px solid var(--gold);">
                <option>Tier 1: Assisted (Internal/Prototyping)</option>
                <option>Tier 2: Collaborative (Commercial/Cast Ai Stars)</option>
                <option>Tier 3: Sovereign (Full IP/NMMMB Gallery)</option>
            </select>
        </div>

        <button type="button" class="btn-submit">Execute Forensic Audit & Sign Manifest</button>
    </form>
</div>

<footer>
    © 2026 SOLOMON KIN, LLC | BUREAU RECORD 01 | DATA SOVEREIGNTY SECURED
</footer>

</body>
</html>
