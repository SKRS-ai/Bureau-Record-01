<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCHITECT LOGIN | USA KINsense 1.0vRoot</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bureau-blue: #001f3f;
            --bureau-gold: #b8860b;
            --gov-gray: #f8f9fa;
            --border-frame: 15px;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: #ffffff; 
            margin: 0; 
            padding: var(--border-frame);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* INSTITUTIONAL BORDER */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            border: var(--border-frame) solid var(--gov-gray);
            pointer-events: none;
            z-index: 9999;
        }

        /* PERSISTENT NAVIGATION */
        header {
            background: #fff;
            border-bottom: 2px solid var(--bureau-blue);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1000;
        }

        .logo { font-family: 'Libre Baskerville'; color: var(--bureau-blue); font-weight: 700; font-size: 1rem; text-transform: uppercase; }
        nav a { text-decoration: none; color: var(--bureau-blue); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-left: 20px; letter-spacing: 1px; }

        /* LOGIN TERMINAL */
        .login-center {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 50px;
            background: #fff;
            border: 1px solid #eee;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 { font-family: 'Libre Baskerville'; color: var(--bureau-blue); font-size: 1.8rem; margin-bottom: 5px; }
        .login-subtitle { font-size: 0.6rem; color: var(--bureau-gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }

        form { text-align: left; }
        label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: #999; display: block; margin-bottom: 8px; }
        input { 
            width: 100%; padding: 15px; margin-bottom: 25px; 
            border: 1px solid #ddd; background: var(--gov-gray); 
            font-family: 'Montserrat'; box-sizing: border-box; 
        }

        .btn-access { 
            width: 100%; padding: 18px; background: var(--bureau-blue); 
            color: #fff; border: none; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-access:hover { background: var(--bureau-gold); }

        .auth-footer { margin-top: 30px; font-size: 0.7rem; color: #888; }
        .auth-footer a { color: var(--bureau-blue); text-decoration: none; font-weight: 700; }

        /* FOOTER */
        footer {
            background: var(--gov-gray);
            padding: 40px 5%;
            text-align: center;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Bureau of AI-IP Verification</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="ledger.html">Registry</a>
            <a href="prices.html">Tiers</a>
            <a href="register.html">Enroll</a>
        </nav>
    </header>

    <div class="login-center">
        <div class="login-box">
            <h1>Identity Check</h1>
            <p class="login-subtitle">Accessing USA-KIN-1.0v Vault</p>

            <form id="login-form">
                <label>Architect ID (Email)</label>
                <input type="email" id="login-email" required>

                <label>Security Key (Password)</label>
                <input type="password" id="login-password" required>

                <button type="submit" class="btn-access">Open Vault</button>
            </form>

            <div class="auth-footer">
                Not yet anchored? <a href="register.html">Enroll as Architect</a>
            </div>
        </div>
    </div>

    <footer>
        <p style="font-size: 0.6rem; color: #999;">© 2026 USA KINsense 1.0vRoot | Secure Session Encrypted AES-256</p>
    </footer>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://uddnjukvtpypjrwlzoby.supabase.co'; 
        const SUPABASE_KEY = 'PASTE_YOUR_LONG_EYJ_JWT_KEY_HERE'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. SESSION CHECK ---
        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                // If already logged in, bypass login and go to Vault
                window.location.href = 'inventory.html';
            }
        }
        checkSession();

        // --- 3. LOGIN EXECUTION ---
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("ACCESS DENIED: " + error.message);
            } else {
                window.location.href = 'inventory.html';
            }
        });
    </script>
</body>
</html>
