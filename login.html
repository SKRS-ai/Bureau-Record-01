<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE GATEWAY | AI-IPVB 1.0vRoot</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bureau-blue: #001f3f; --bureau-gold: #b8860b; --bg: #050505; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #0a0a0c; border: 1px solid #222; padding: 60px; width: 400px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .login-box h1 { font-family: 'Libre Baskerville'; color: var(--bureau-gold); font-size: 1.8rem; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0 20px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box; }
        .btn-execute { background: var(--bureau-gold); color: #000; width: 100%; padding: 18px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .btn-execute:hover { background: #fff; }
        label { display: block; text-align: left; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--bureau-gold); }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Architect Login</h1>
        <p style="font-size: 0.7rem; letter-spacing: 3px; color: #444; margin-bottom: 40px;">SECURE GATEWAY v1.0v</p>
        
        <form onsubmit="executeSecureLogin(event)">
            <label>Architect ID (Email)</label>
            <input type="email" id="architect-email" required placeholder="name@kin-sense.io">
            
            <label>Security Key (Passcode)</label>
            <input type="password" id="security-key" required placeholder="••••••••">
            
            <button type="submit" class="btn-execute">Initialize Session</button>
        </form>
    </div>

    <script>
        function executeSecureLogin(event) {
            event.preventDefault();
            const email = document.getElementById('architect-email').value;
            const key = document.getElementById('security-key').value;

            // SIMULATED AUTH: Accept any valid-looking data, but issue a token
            if(email && key.length >= 6) {
                localStorage.setItem('SovereignToken', 'USA-KIN-9921-ACTIVE');
                localStorage.setItem('ArchitectName', email.split('@')[0].toUpperCase());
                
                alert("BIOMETRIC MATCH CONFIRMED. Accessing 1.0vRoot...");
                window.location.href = 'inventory.html';
            } else {
                alert("ACCESS DENIED: Credentials do not match Bureau records.");
            }
        }
    </script>
</body>
