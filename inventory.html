<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | USA KINsense 1.0vRoot | AI-IPVB</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bureau-blue: #001f3f; --bureau-gold: #b8860b; --bg: #0a0a0b; --card: #141416; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--bg); color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        .telemetry { background: #000; padding: 12px 5%; display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--bureau-gold); border-bottom: 1px solid #222; }
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; padding: 50px 5%; }
        .asset-card { background: var(--card); border: 1px solid #222; padding: 25px; }
        .btn-execute { background: var(--bureau-gold); color: #000; width: 100%; padding: 15px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="telemetry">
        <div>NODE ID: USA KINsense 1.0vRoot</div>
        <div>SESSION: <span id="session-status" style="color:#39ff14;">ACTIVE</span></div>
        <div id="architect-name">LOADING ARCHITECT...</div>
    </div>

    <main class="asset-grid" id="asset-container">
        </main>

    <script>
        // --- 1. PLUG IN YOUR CREDENTIALS HERE ---
        const SUPABASE_URL = 'YOUR_SUPABASE_PROJECT_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. AUTH GUARD ---
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('architect-name').innerText = user.email.toUpperCase();
                loadAssets(user.id);
            }
        }

        // --- 3. LOAD PERSISTENT ASSETS ---
        async function loadAssets(userId) {
            const container = document.getElementById('asset-container');
            
            const { data: assets, error } = await supabase
                .from('assets') // Your table name in Supabase
                .select('*')
                .eq('user_id', userId);

            if (error) console.error(error);
            
            if (assets) {
                assets.forEach(asset => {
                    const card = document.createElement('div');
                    card.className = 'asset-card';
                    card.innerHTML = `
                        <h3 style="font-family:'Libre Baskerville';">${asset.name}</h3>
                        <p style="font-size:0.7rem; color:var(--bureau-gold);">$C_k$ DELTA: ${asset.ck_score}%</p>
                        <button class="btn-execute" onclick="deList('${asset.id}')">De-list from 1.0vRoot</button>
                    `;
                    container.appendChild(card);
                });
            }
        }

        async function deList(assetId) {
            const { error } = await supabase.from('assets').delete().eq('id', assetId);
            if (!error) location.reload();
        }

        checkUser();
    </script>
</body>
</html>
