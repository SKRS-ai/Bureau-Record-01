<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE VAULT | USA KINsense 1.0v Root | AI-IPVB</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bureau-blue: #001f3f;
            --bureau-gold: #b8860b;
            --tactical-slate: #0a0a0b;
            --card-bg: #141416;
            --status-green: #39ff14;
            --text-muted: #666;
        }

        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--tactical-slate); color: #fff; display: flex; overflow-x: hidden; min-height: 100vh; }

        /* 1. TELEMETRY STRIP (TOP FIXED) */
        .telemetry {
            position: fixed; top: 0; width: 100%; background: #000; padding: 12px 5%;
            display: flex; justify-content: space-between; font-size: 0.65rem; 
            font-weight: 700; letter-spacing: 2px; color: var(--bureau-gold); border-bottom: 1px solid #222; z-index: 1000;
        }

        /* 2. MAIN CONTENT AREA */
        .main-vault { flex: 1; padding: 100px 5% 50px; transition: 0.5s ease; }
        .vault-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid #222; padding-bottom: 30px; margin-bottom: 40px; }
        .vault-header h1 { font-family: 'Libre Baskerville'; font-size: 2.8rem; margin: 0; }

        /* 3. ASSET GRID */
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 30px; }
        .asset-card { background: var(--card-bg); border: 1px solid #222; padding: 25px; position: relative; transition: 0.3s; }
        .asset-card:hover { border-color: var(--bureau-gold); box-shadow: 0 0 30px rgba(184, 134, 11, 0.1); }
        
        .asset-preview { width: 100%; height: 220px; background: #000; margin-bottom: 20px; border: 1px solid #333; overflow: hidden; }
        .asset-preview video, .asset-preview img { width: 100%; height: 100%; object-fit: cover; }

        .ck-badge { position: absolute; top: 35px; right: 35px; background: rgba(0,0,0,0.8); border: 1px solid var(--bureau-gold); padding: 8px; font-size: 0.6rem; text-align: center; }
        .ck-badge span { display: block; font-size: 1rem; color: var(--bureau-gold); }

        /* 4. SUBMISSION SIDE PANEL */
        .side-panel {
            width: 0; position: fixed; right: 0; top: 0; height: 100%; background: #000;
            border-left: 2px solid var(--bureau-gold); overflow-x: hidden; transition: 0.5s; z-index: 2000;
            padding-top: 100px; box-shadow: -20px 0 50px rgba(0,0,0,0.5);
        }
        .panel-content { padding: 40px; width: 400px; }
        .panel-content h2 { font-family: 'Libre Baskerville'; color: var(--bureau-gold); margin-bottom: 30px; }
        
        input, select, textarea { 
            width: 100%; background: #111; border: 1px solid #333; color: #fff; 
            padding: 12px; margin-bottom: 20px; font-family: 'Montserrat'; font-size: 0.8rem;
        }
        label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--bureau-gold); display: block; margin-bottom: 8px; }

        .btn-execute { background: var(--bureau-gold); color: #000; width: 100%; padding: 18px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; }
        .btn-execute:hover { background: #fff; }

        /* 5. UPLOAD TRIGGER */
        .ingest-btn { background: var(--bureau-blue); color: #fff; padding: 15px 40px; border: 1px solid var(--bureau-gold); cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        #file-input { display: none; }

        .status-dot { width: 8px; height: 8px; background: var(--status-green); border-radius: 50%; display: inline-block; margin-right: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="telemetry">
        <div>NODE ID: USA KINsense 1.0vRoot</div>
        <div>METROLOGY SYNC: 100% | AES-256 ACTIVE</div>
        <div>ARCHITECT: MUSTAFA KING BROWN</div>
    </div>

    <main class="main-vault" id="main-vault">
        <header class="vault-header">
            <div>
                <h1>The Sovereign Vault</h1>
                <p style="color:var(--bureau-gold); opacity:0.8;">Private Asset Ingest & Metrology</p>
            </div>
            <label for="file-input" class="ingest-btn">Ingest New Asset</label>
            <input type="file" id="file-input" accept="image/*,video/*" onchange="openSubmission(event)">
        </header>

        <div class="asset-grid" id="asset-container">
            <div class="asset-card">
                <div class="ck-badge">GRADIENT<span>92.1%</span></div>
                <div class="asset-preview">
                    <video autoplay muted loop><source src="assets/mustafa-profile.mp4" type="video/mp4"></video>
                </div>
                <h3 style="font-family:'Libre Baskerville'; margin:0;">Master Profile: Mustafa King Brown</h3>
                <p style="font-size:0.7rem; color:var(--status-green); margin:10px 0;"><span class="status-dot"></span> SOVEREIGN REGISTRY ACTIVE</p>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-execute" style="font-size:0.6rem; padding:10px;">View Record</button>
                    <button class="btn-execute" style="background:transparent; border:1px solid #444; color:#fff; font-size:0.6rem; padding:10px;" onclick="deList(this)">De-list</button>
                </div>
            </div>
        </div>
    </main>

    <div id="side-panel" class="side-panel">
        <div class="panel-content">
            <h2>Forensic Audit Statement</h2>
            <div id="preview-box" style="width:100%; height:150px; background:#000; margin-bottom:20px; border:1px solid #333;"></div>
            
            <form id="audit-form">
                <label>Asset Designation</label>
                <input type="text" id="asset-name" placeholder="Project Name">

                <label>Methodology Tier</label>
                <select id="tier-select">
                    <option value="T1">Tier 1: Assisted</option>
                    <option value="T2">Tier 2: Collaborative</option>
                    <option value="T3">Tier 3: Sovereign</option>
                </select>

                <label>Human Delta Statement ($C_k$)</label>
                <textarea rows="4" placeholder="Describe the directorial nodes and iterative steps taken..."></textarea>

                <button type="button" class="btn-execute" onclick="anchorAsset()">Anchor to 1.0vRoot</button>
                <button type="button" style="background:none; border:none; color:#666; margin-top:20px; cursor:pointer;" onclick="closePanel()">Cancel Ingest</button>
            </form>
        </div>
    </div>

    <script>
        let pendingFile = null;

        // 1. OPEN SIDE PANEL ON INGEST
        function openSubmission(event) {
            const file = event.target.files[0];
            if (!file) return;
            pendingFile = file;

            // Prepare Preview
            const reader = new FileReader();
            reader.onload = function(e) {
                const previewBox = document.getElementById('preview-box');
                previewBox.innerHTML = file.type.includes('video') 
                    ? `<video autoplay muted loop src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;"></video>` 
                    : `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                
                document.getElementById('asset-name').value = file.name;
                document.getElementById('side-panel').style.width = "450px";
                document.getElementById('main-vault').style.marginRight = "450px";
            };
            reader.readAsDataURL(file);
        }

        // 2. CLOSE PANEL
        function closePanel() {
            document.getElementById('side-panel').style.width = "0";
            document.getElementById('main-vault').style.marginRight = "0";
            document.getElementById('file-input').value = "";
        }

        // 3. ANCHOR ASSET (SIMULATE PERSISTENCE)
        function anchorAsset() {
            const name = document.getElementById('asset-name').value;
            const tier = document.getElementById('tier-select').value;
            const previewHtml = document.getElementById('preview-box').innerHTML;

            const container = document.getElementById('asset-container');
            const newCard = document.createElement('div');
            newCard.className = 'asset-card';
            newCard.innerHTML = `
                <div class="ck-badge" style="border-color:#444; color:#666;">PENDING<span>AUDIT</span></div>
                <div class="asset-preview">${previewHtml}</div>
                <h3 style="font-family:'Libre Baskerville'; margin:0;">${name}</h3>
                <p style="font-size:0.7rem; color:var(--bureau-gold); margin:10px 0;">ANCHORED TO USA KINsense 1.0vRoot</p>
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="btn-execute" style="font-size:0.6rem; padding:10px;">Execute Audit</button>
                    <button class="btn-execute" style="background:transparent; border:1px solid #444; color:#fff; font-size:0.6rem; padding:10px;" onclick="deList(this)">De-list</button>
                </div>
            `;
            container.prepend(newCard);
            
            alert("SECURE ANCHOR SUCCESSFUL: Asset data moved to USA KINsense 1.0vRoot. Forensic verification scheduled.");
            closePanel();
        }

        // 4. DE-LIST (VISUAL ONLY)
        function deList(btn) {
            if(confirm("Confirm De-listing? Metadata will remain in the 1.0vRoot Ledger.")) {
                btn.closest('.asset-card').remove();
            }
        }
    </script>

</body>
</html>
