<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENROLLMENT TERMINAL | AI-IPVB Architect Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bureau-blue: #001f3f;
            --bureau-gold: #b8860b;
            --bg-dark: #050505;
            --text-light: #fdfdfd;
        }

        body { font-family: 'Montserrat', sans-serif; background: var(--bg-dark); color: var(--text-light); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 40px 0; }

        /* 1. REGISTRATION CONTAINER */
        .enrollment-box { 
            background: #0a0a0c; border: 1px solid #222; padding: 60px; 
            width: 550px; max-width: 90%; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border-top: 5px solid var(--bureau-gold);
        }
        .enrollment-box h1 { font-family: 'Libre Baskerville'; color: var(--bureau-gold); font-size: 2.2rem; margin: 0 0 10px 0; text-align: center; }
        .enrollment-box p.subtitle { text-align: center; font-size: 0.7rem; letter-spacing: 4px; color: #555; text-transform: uppercase; margin-bottom: 40px; }

        /* 2. FORM STYLING */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }

        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--bureau-gold); margin-bottom: 8px; }
        input, select { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; 
            color: #fff; box-sizing: border-box; font-family: 'Montserrat'; font-size: 0.85rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--bureau-gold); outline: none; background: #080808; }

        /* 3. EXECUTION BUTTON */
        .btn-register { 
            background: var(--bureau-gold); color: #000; width: 100%; padding: 20px; 
            border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; 
            letter-spacing: 3px; font-size: 0.9rem; margin-top: 30px; transition: 0.4s;
        }
        .btn-register:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(184, 134, 11, 0.2); }

        .legal-footer { margin-top: 30px; font-size: 0.6rem; color: #444; line-height: 1.6; text-align: center; }
    </style>
</head>
<body>

    <div class="enrollment-box">
        <h1>Architect Enrollment</h1>
        <p class="subtitle">Establish Pillar One Identity</p>
        
        <form onsubmit="handleRegistration(event)">
            <div class="form-grid">
                <div class="full-width">
                    <label>Full Legal Name (For Article III Use)</label>
                    <input type="text" id="reg-name" required placeholder="e.g. MUSTAFA KING BROWN">
                </div>

                <div class="full-width">
                    <label>Architect ID (Primary Email)</label>
                    <input type="email" id="reg-email" required placeholder="name@kin-sense.io">
                </div>

                <div>
                    <label>Primary Discipline</label>
                    <select id="reg-discipline">
                        <option value="visual">Visual Architect</option>
                        <option value="music">Sonic Producer</option>
                        <option value="film">AI Film Director</option>
                        <option value="dev">Software Architect</option>
                    </select>
                </div>

                <div>
                    <label>Assigned Root Node</label>
                    <select id="reg-node">
                        <option value="USA-1.0v">USA KINsense 1.0v</option>
                        <option value="EU-01">EU Root-01</option>
                        <option value="ASIA-01">Asia Root-01</option>
                    </select>
                </div>

                <div class="full-width">
                    <label>Initialize Security Key (Password)</label>
                    <input type="password" id="reg-key" required minlength="6" placeholder="Min. 6 Characters">
                </div>
            </div>

            <button type="submit" class="btn-register">Initialize Pillar One</button>
        </form>

        <div class="legal-footer">
            By enrolling, you acknowledge that all creative parentage claims are subject to the Solomon Kin Protocol. Unauthorized use of Node 1.0vRoot is prohibited under Federal Law.
        </div>
    </div>

   <script>
    // 1. YOUR SUPABASE CREDENTIALS
    const SUPABASE_URL = 'YOUR_PROJECT_URL';
    const SUPABASE_KEY = 'YOUR_ANON_KEY';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function handleRegistration(event) {
        event.preventDefault();
        
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-key').value;
        const fullName = document.getElementById('reg-name').value;

        // 2. CREATE THE USER IN SUPABASE AUTH
        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { display_name: fullName } // Stores the name in the user metadata
            }
        });

        if (error) {
            alert("ENROLLMENT ERROR: " + error.message);
        } else {
            alert("IDENTITY ANCHORED. Check your email for a confirmation link (if enabled) or proceed to login.");
            window.location.href = 'login.html';
        }
    }
</script>

</body>
</html>
